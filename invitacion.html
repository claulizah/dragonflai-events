<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación — DragonflAI Events</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<meta name="description" content="Estás invitado — confirma tu asistencia aquí.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --teal:#2EC4B6; --teal-dark:#0D6E65; --teal-light:#EAF7F6;
  --violet:#7B2FBE; --violet-light:#F3EAFB;
  --night:#0D1B2A; --night-2:#152238;
  --text:#1A2332; --text-2:#4A5568; --text-3:#8A94A6;
  --white:#FFFFFF; --cream:#FAF9F7; --cream-2:#F5F3EF;
  --border-gray:#E5E1D8; --radius:14px; --radius-lg:22px;
  --shadow-md:0 8px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.wrap{max-width:560px;width:100%}
.brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:2rem;opacity:.7}
.brand span{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text-2)}

/* ── TARJETA (mismos temas que el Save the Date de la app) ── */
.card{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:3rem 2rem;text-align:center;background:linear-gradient(135deg,var(--teal-light),var(--violet-light));box-shadow:var(--shadow-md);margin-bottom:1.5rem}
.card.theme-blush{background:linear-gradient(135deg,#FCE8EC,#F8D7DE)}
.card.theme-gold{background:linear-gradient(135deg,#FDF6E3,#F5E6C8)}
.card.theme-sage{background:linear-gradient(135deg,#E8F0E5,#D4E4CE)}
.card.theme-night{background:linear-gradient(135deg,#1A2332,#2B3A52)}
.card.theme-night .eyebrow,.card.theme-night .names,.card.theme-night .detail-item,.card.theme-night .msg{color:#F0E8D8!important}
.card.theme-blanco{background:#FFFFFF;border:1px solid var(--border-gray)}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:1rem;font-weight:600}
.names{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,7vw,3.2rem);font-weight:600;text-transform:uppercase;line-height:1.15;margin-bottom:1rem}
.divider{width:60px;height:1px;background:currentColor;opacity:.3;margin:0 auto 1.2rem}
.details{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem;font-size:14.5px}
.detail-item{display:flex;align-items:center;justify-content:center;gap:6px}
.msg{font-size:13px;color:var(--text-2);font-style:italic;margin-top:.5rem}
.hashtag{font-size:13px;color:var(--teal-dark);font-weight:600;margin-top:.6rem}
.countdown{display:flex;justify-content:center;gap:1.5rem;margin-top:1.5rem}
.cd-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--teal-dark)}
.cd-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}

/* ── RSVP ── */
.rsvp-card{background:var(--white);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-md)}
.rsvp-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;text-align:center;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:.4rem}
.field input[type=text],.field input[type=number],.field textarea{width:100%;padding:11px;border-radius:var(--radius);border:1.5px solid var(--border-gray);font-family:'Inter',sans-serif;font-size:14px;background:var(--cream-2)}
.field textarea{resize:vertical;min-height:70px}
.attend-toggle{display:flex;gap:10px}
.attend-opt{flex:1;padding:14px;border-radius:var(--radius);border:1.5px solid var(--border-gray);text-align:center;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;background:var(--cream-2);color:var(--text-2)}
.attend-opt.sel-yes{background:var(--teal);border-color:var(--teal);color:#fff}
.attend-opt.sel-no{background:#E8637A;border-color:#E8637A;color:#fff}
.btn-submit{width:100%;padding:14px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--teal),var(--violet));color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:.5rem}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.state-msg{text-align:center;padding:3rem 1rem;color:var(--text-2)}
.state-msg h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);margin-bottom:.5rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--night);color:#fff;padding:12px 20px;border-radius:100px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <svg width="20" height="20" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="18" cy="20" rx="2.2" ry="8" fill="#2EC4B6"/><ellipse cx="18" cy="13" rx="2.8" ry="2.8" fill="#2EC4B6"/><ellipse cx="10" cy="14" rx="8" ry="4" fill="#7B2FBE" opacity=".5" transform="rotate(-20 10 14)"/><ellipse cx="26" cy="14" rx="8" ry="4" fill="#7B2FBE" opacity=".5" transform="rotate(20 26 14)"/></svg>
    <span>DragonflAI Events</span>
  </div>

  <div id="content">
    <div class="state-msg"><h2>Cargando…</h2></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://wpgdkfdoecohoowwoywx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwZ2RrZmRvZWNvaG9vd3dveXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTgxMDYsImV4cCI6MjA5ODc3NDEwNn0.Q382UChw8J5zjXaTgNCvJN4_eh2-HmOQQBDlRjBxm2U';
const sb = (window.supabase && SUPABASE_URL.startsWith('http'))
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

let invitation=null;

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

function getSlug(){
  // Soporta tanto /i/mi-slug (URL bonita vía _redirects) como ?slug=mi-slug (respaldo)
  const path=location.pathname.replace(/\/+$/,'');
  const parts=path.split('/').filter(Boolean);
  const idxI=parts.indexOf('i');
  if(idxI!==-1 && parts[idxI+1]) return decodeURIComponent(parts[idxI+1]);
  const qs=new URLSearchParams(location.search);
  return qs.get('slug')||qs.get('i')||'';
}

function renderNotFound(){
  document.getElementById('content').innerHTML=`
    <div class="state-msg">
      <h2>😕 No encontramos esta invitación</h2>
      <p>Puede que el link esté incompleto o que la invitación ya no esté disponible.</p>
    </div>`;
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  const diff=Math.ceil((d-new Date())/(1000*60*60*24));
  return diff>=0?diff:null;
}

function renderInvitation(inv){
  const days=daysUntil(inv.event_date_raw);
  document.getElementById('content').innerHTML=`
    <div class="card ${esc(inv.theme||'theme-teal')}">
      <div class="eyebrow">— ${inv.event_type?esc(inv.event_type):'Estás invitado'} —</div>
      <div class="names">${esc(inv.host_names)}</div>
      <div class="divider"></div>
      <div class="details">
        ${inv.event_date?`<div class="detail-item">📅 ${esc(inv.event_date)}</div>`:''}
        ${inv.location?`<div class="detail-item">📍 ${esc(inv.location)}</div>`:''}
        ${inv.event_time?`<div class="detail-item">🕕 ${esc(inv.event_time)}</div>`:''}
        ${inv.dress_code?`<div class="detail-item">👔 ${esc(inv.dress_code)}</div>`:''}
      </div>
      ${inv.message?`<div class="msg">${esc(inv.message)}</div>`:''}
      ${inv.hashtag?`<div class="hashtag">${esc(inv.hashtag)}</div>`:''}
      ${days!==null?`<div class="countdown"><div><div class="cd-num">${days}</div><div class="cd-lbl">Días</div></div></div>`:''}
    </div>

    <div class="rsvp-card">
      <div class="rsvp-title">Confirma tu asistencia</div>
      <form id="rsvp-form">
        <div class="field">
          <label>Tu nombre</label>
          <input type="text" id="r-name" required>
        </div>
        <div class="field">
          <label>¿Asistes?</label>
          <div class="attend-toggle">
            <div class="attend-opt" id="opt-yes" onclick="setAttending(true)">Sí, ahí estaré 🎉</div>
            <div class="attend-opt" id="opt-no" onclick="setAttending(false)">No podré ir</div>
          </div>
        </div>
        ${inv.ask_guest_count?`<div class="field" id="field-guests" style="display:none">
          <label>Número de acompañantes</label>
          <input type="number" id="r-guests" min="0" value="0">
        </div>`:''}
        ${inv.ask_dietary?`<div class="field" id="field-dietary" style="display:none">
          <label>Restricción alimentaria (opcional)</label>
          <input type="text" id="r-dietary" placeholder="ej. Vegetariano, sin gluten…">
        </div>`:''}
        ${inv.custom_question?`<div class="field" id="field-custom" style="display:none">
          <label>${esc(inv.custom_question)}</label>
          <input type="text" id="r-custom">
        </div>`:''}
        ${inv.ask_message?`<div class="field" id="field-message" style="display:none">
          <label>Mensaje para los anfitriones (opcional)</label>
          <textarea id="r-message" placeholder="¡Felicidades! 💌"></textarea>
        </div>`:''}
        <button type="submit" class="btn-submit" id="btn-submit" disabled>Confirmar</button>
      </form>
    </div>`;

  document.getElementById('rsvp-form').addEventListener('submit',submitRSVP);
}

let attending=null;
function setAttending(val){
  attending=val;
  document.getElementById('opt-yes').classList.toggle('sel-yes',val===true);
  document.getElementById('opt-no').classList.toggle('sel-no',val===false);
  ['field-guests','field-dietary','field-custom','field-message'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=(val===true)?'block':'none';
  });
  document.getElementById('btn-submit').disabled=false;
}

async function submitRSVP(e){
  e.preventDefault();
  const name=document.getElementById('r-name').value.trim();
  if(!name){ showToast('Escribe tu nombre'); return; }
  if(attending===null){ showToast('Indica si asistes o no'); return; }

  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='Enviando…';

  const payload={
    invitation_id: invitation.id,
    guest_name: name,
    attending,
    guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
    dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
    message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
    custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
  };

  const {error}=await sb.from('rsvps').insert(payload);
  if(error){
    showToast('No se pudo enviar, intenta de nuevo');
    btn.disabled=false; btn.textContent='Confirmar';
    return;
  }

  document.getElementById('content').innerHTML=`
    <div class="state-msg">
      <h2>${attending?'🎉 ¡Gracias por confirmar!':'💌 Gracias por avisarnos'}</h2>
      <p>${attending?'Nos vemos pronto.':'Te vamos a extrañar, pero gracias por decirnos.'}</p>
    </div>`;
}

async function init(){
  if(!sb){ renderNotFound(); return; }
  const slug=getSlug();
  if(!slug){ renderNotFound(); return; }

  const {data,error}=await sb.from('invitations').select('*').eq('slug',slug).eq('is_published',true).single();
  if(error||!data){ renderNotFound(); return; }

  invitation=data;
  renderInvitation(data);
}

init();
</script>
</body>
</html>
