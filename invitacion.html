<style>
:root{
  --teal:#2EC4B6; --teal-dark:#0D6E65; --teal-light:#EAF7F6;
  --violet:#7B2FBE; --violet-light:#F3EAFB;
  --night:#0D1B2A; --night-2:#152238;
  --text:#1A2332; --text-2:#4A5568; --text-3:#8A94A6;
  --white:#FFFFFF; --cream:#FAF9F7; --cream-2:#F5F3EF;
  --border-gray:#E5E1D8; --radius:14px; --radius-lg:22px;
  --shadow-md:0 8px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.wrap{max-width:560px;width:100%}
.brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:2rem;opacity:.7}
.brand span{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text-2)}

/* ── TARJETA (mismos temas que el Save the Date de la app) ── */
.card{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:3rem 2rem;text-align:center;background:var(--cream);border:1px solid var(--border-gray);box-shadow:var(--shadow-md);margin-bottom:1.5rem}
.card.theme-teal .eyebrow,.card.theme-teal .hashtag{color:var(--teal-dark)}
.card.theme-blush .eyebrow,.card.theme-blush .hashtag{color:#C14A5E}
.card.theme-gold .eyebrow,.card.theme-gold .hashtag{color:#B8860B}
.card.theme-sage .eyebrow,.card.theme-sage .hashtag{color:#5A7C52}
.card.theme-night .eyebrow,.card.theme-night .hashtag{color:#1A2332}
.card.theme-blanco{background-color:#FFFFFF!important}
.card.theme-blanco .eyebrow,.card.theme-blanco .hashtag{color:var(--text-3)}
/* ── Fondos con detalle decorativo — mismos 4 que en el Save the Date de la app ── */
.card.theme-confetti{background-color:#FFFEFC!important;border:1.5px solid rgba(212,151,42,.4)!important}
.card.theme-confetti .eyebrow,.card.theme-confetti .hashtag{color:#C14A5E}
.floral-corner{display:none;position:absolute;width:82px;height:82px;pointer-events:none;z-index:2}
.card.theme-confetti .floral-corner{display:block}
.floral-corner.fc-tl{top:0;left:0}
.floral-corner.fc-br{bottom:0;right:0;transform:rotate(180deg)}
.card.theme-waves{background-color:#FFFEFB!important;border:1.5px solid rgba(90,124,82,.35)!important}
.card.theme-waves .eyebrow,.card.theme-waves .hashtag{color:#5A7C52}
.card.theme-paper{background-color:#FFFEFC!important;border:1.5px solid rgba(139,115,85,.35)!important}
.card.theme-paper .eyebrow,.card.theme-paper .hashtag{color:#8B7355}
.card.theme-sparkle{background-color:#FFFEFA!important;border:1.5px solid rgba(212,151,42,.4)!important}
.card.theme-sparkle .eyebrow,.card.theme-sparkle .hashtag{color:#B8860B}
.card.theme-balloons{background-color:#FFFEFC!important;border:1.5px solid rgba(232,99,122,.3)!important}
.card.theme-balloons .eyebrow,.card.theme-balloons .hashtag{color:#C14A5E}
.card.theme-clouds{background-color:#FDFEFF!important;border:1.5px solid rgba(184,212,234,.5)!important}
.card.theme-clouds .eyebrow,.card.theme-clouds .hashtag{color:#5A8FBE}
.card.theme-geometric{background-color:#FFFFFF!important;border:1.5px solid rgba(13,27,42,.25)!important}
.card.theme-geometric .eyebrow,.card.theme-geometric .hashtag{color:#0D1B2A}
.card.theme-graduation{background-color:#FFFEFC!important;border:1.5px solid rgba(212,151,42,.4)!important}
.card.theme-graduation .eyebrow,.card.theme-graduation .hashtag{color:#1A2332}
.card.theme-hearts{background-color:#FFFCFC!important;border:1.5px solid rgba(232,99,122,.35)!important}
.card.theme-hearts .eyebrow,.card.theme-hearts .hashtag{color:#C14A5E}
.card.theme-animals{background-color:#FFFEFB!important;border:1.5px solid rgba(212,151,42,.35)!important}
.card.theme-animals .eyebrow,.card.theme-animals .hashtag{color:#B8860B}
.leaf-corner,.flourish-corner,.sparkle-corner,.balloon-corner,.cloud-corner,.geo-corner,.grad-corner,.heart-corner,.animal-corner{display:none;position:absolute;width:82px;height:82px;pointer-events:none;z-index:2}
.card.theme-waves .leaf-corner{display:block}
.card.theme-paper .flourish-corner{display:block}
.card.theme-sparkle .sparkle-corner{display:block}
.card.theme-balloons .balloon-corner{display:block}
.card.theme-clouds .cloud-corner{display:block}
.card.theme-geometric .geo-corner{display:block}
.card.theme-graduation .grad-corner{display:block}
.card.theme-hearts .heart-corner{display:block}
.card.theme-animals .animal-corner{display:block}
.leaf-corner.fc-tl,.flourish-corner.fc-tl,.sparkle-corner.fc-tl,.balloon-corner.fc-tl,.cloud-corner.fc-tl,.geo-corner.fc-tl,.grad-corner.fc-tl,.heart-corner.fc-tl,.animal-corner.fc-tl{top:0;left:0}

.card.theme-custom-color .eyebrow,.card.theme-custom-color .hashtag{color:var(--custom-accent-color,#1A2332)}
.card.theme-custom-photo{background-size:cover!important;background-position:center!important;position:relative}
.card.theme-custom-photo::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.82);z-index:0;border-radius:inherit}
.card.theme-custom-photo>*{position:relative;z-index:1}
.card.theme-custom-photo .eyebrow,.card.theme-custom-photo .hashtag{color:var(--violet)}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:1rem;font-weight:600}
.names{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,7vw,3.2rem);font-weight:600;line-height:1.15;margin-bottom:1rem;color:var(--text)}
.divider{width:60px;height:1px;background:var(--border-gray);margin:0 auto 1.2rem}
.details{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem;font-size:14.5px;color:var(--text-2)}
.detail-item{display:flex;align-items:center;justify-content:center;gap:6px}
.msg{font-size:13px;color:var(--text-2);font-style:italic;margin-top:.5rem}
.hashtag{font-size:13px;color:var(--teal-dark);font-weight:600;margin-top:.6rem}
.countdown{display:flex;justify-content:center;gap:1.5rem;margin-top:1.5rem}
.cd-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--teal-dark)}
.cd-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}

/* ── RSVP ── */
.rsvp-card{background:var(--white);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-md)}

/* ── Secciones extra: historia, itinerario, hospedaje, galería, regalos, FAQ ── */
.extra-card{background:var(--white);border-radius:var(--radius-lg);padding:1.75rem;box-shadow:var(--shadow-md);margin-bottom:1.25rem}
.extra-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--text);margin-bottom:1rem;text-align:center}
.extra-story{font-size:14px;line-height:1.7;color:var(--text-2);text-align:center}
.schedule-item{padding:12px 0;border-top:1px solid var(--border-gray)}
.schedule-item:first-of-type{border-top:none}
.schedule-name{font-weight:600;font-size:14.5px;color:var(--text);margin-bottom:3px}
.schedule-meta{font-size:12.5px;color:var(--text-2);margin-bottom:2px}
.schedule-desc{font-size:12.5px;color:var(--text-3);font-style:italic;margin-top:4px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gallery-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px}
.extra-links-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.extra-link-btn{display:inline-block;padding:10px 18px;border-radius:100px;background:var(--teal-light);color:var(--teal-dark);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s}
.extra-link-btn:hover{background:var(--teal);color:#fff}
.faq-item{padding:10px 0;border-top:1px solid var(--border-gray)}
.faq-item:first-of-type{border-top:none}
.faq-q{font-weight:600;font-size:13.5px;color:var(--text);margin-bottom:3px}
.faq-a{font-size:13px;color:var(--text-2);line-height:1.5}
.rsvp-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;text-align:center;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:.4rem}
.field input[type=text],.field input[type=number],.field textarea{width:100%;padding:11px;border-radius:var(--radius);border:1.5px solid var(--border-gray);font-family:'Inter',sans-serif;font-size:14px;background:var(--cream-2)}
.field textarea{resize:vertical;min-height:70px}
.attend-toggle{display:flex;gap:10px}
.attend-opt{flex:1;padding:14px;border-radius:var(--radius);border:1.5px solid var(--border-gray);text-align:center;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;background:var(--cream-2);color:var(--text-2)}
.attend-opt.sel-yes{background:var(--teal);border-color:var(--teal);color:#fff}
.attend-opt.sel-no{background:#E8637A;border-color:#E8637A;color:#fff}
.btn-submit{width:100%;padding:14px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--teal),var(--violet));color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:.5rem}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.state-msg{text-align:center;padding:3rem 1rem;color:var(--text-2)}
.state-msg h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);margin-bottom:.5rem}
.thanks-card{text-align:center;padding:3rem 2rem;background:linear-gradient(135deg,var(--teal-light),var(--violet-light));border-radius:var(--radius-lg);box-shadow:var(--shadow-md);cursor:default}
.thanks-emoji{font-size:52px;margin-bottom:.5rem}
.thanks-card h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);margin-bottom:.6rem}
.thanks-card p{font-size:15px;color:var(--text-2)}
.thanks-brand{margin-top:1.5rem;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--teal-dark);letter-spacing:.03em}
.planner-watermark{margin-top:1.2rem;margin-bottom:1rem;font-size:10px;color:var(--text-3);letter-spacing:.03em;opacity:.6;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--night);color:#fff;padding:12px 20px;border-radius:100px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s;z-index:100}
.toast.show{opacity:1}
.lang-toggle{display:flex;justify-content:center;gap:6px;margin-bottom:1rem}
.lang-btn{padding:4px 12px;border-radius:100px;border:1px solid var(--border-gray);background:var(--white);color:var(--text-2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);font-weight:600}
.guest-match{padding:10px 12px;border:1.5px solid var(--border-gray);border-radius:var(--radius);margin-top:6px;cursor:pointer;font-size:13.5px;transition:all .15s}
.guest-match:hover{border-color:var(--teal);background:var(--teal-light)}
.group-member-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(0,0,0,.06);font-size:13.5px}
.group-member-row:first-of-type{border-top:none}
.group-member-done{font-size:11px;color:var(--text-3);font-weight:400}
.attend-toggle-mini{display:flex;gap:6px}
.mini-btn{padding:5px 12px;border-radius:100px;border:1.5px solid var(--border-gray);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-2);font-family:'Inter',sans-serif}
.mini-sel-yes{background:var(--teal);border-color:var(--teal);color:#fff}
.mini-sel-no{background:#E8637A;border-color:#E8637A;color:#fff}

async function submitBugReport(){
  const L=lang==='es';
  if(!sb){ showToast(L?'Supabase no está configurado todavía':'Supabase is not configured yet'); return; }
  const message=document.getElementById('bug-report-message').value.trim();
  if(!message){ showToast(L?'Escribe qué pasó':'Describe what happened'); return; }

  const {error}=await sb.from('bug_reports').insert({
    page: 'invitacion',
    message,
    browser_info: navigator.userAgent
  });

  if(error){ showToast(L?'No se pudo enviar el reporte, intenta de nuevo':'Could not send the report, try again'); return; }
  closeBugReportModal();
  showToast(L?'✅ ¡Gracias! Ya lo tenemos anotado':"✅ Thanks! We've got it noted");
}

function getSlug(){
  // Soporta tanto /i/mi-slug (URL bonita vía _redirects) como ?slug=mi-slug (respaldo)
  const path=location.pathname.replace(/\/+$/,'');
  const parts=path.split('/').filter(Boolean);
  const idxI=parts.indexOf('i');
  if(idxI!==-1 && parts[idxI+1]) return decodeURIComponent(parts[idxI+1]);
  const qs=new URLSearchParams(location.search);
  return qs.get('slug')||qs.get('i')||'';
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  const diff=Math.ceil((d-new Date())/(1000*60*60*24));
  return diff>=0?diff:null;
}

async function onGuestSearchInput(){
  const q=document.getElementById('r-name-search').value.trim();
  const resultsEl=document.getElementById('guest-search-results');
  clearTimeout(guestSearchTimer);
  if(q.length<2){ resultsEl.innerHTML=''; return; }
  guestSearchTimer=setTimeout(async()=>{
    const {data,error}=await sb.rpc('search_guest_list',{p_invitation_id:invitation.id,p_query:q});
    if(error||!data||!data.length){
      resultsEl.innerHTML=`<p style="font-size:12px;color:var(--text-3);margin-top:.5rem">${T[lang].searchNoResults}</p>`;
      return;
    }
    lastSearchResults=data;
    resultsEl.innerHTML=data.map((g,i)=>`<div class="guest-match" onclick="selectGuestMatch(${i})">${esc(g.guest_name)}</div>`).join('');
  },350);
}

let groupMembers=null; // null = modo individual normal; array = modo grupo activo

async function selectGuestMatch(i){
  const g=lastSearchResults[i];
  const {data,error}=await sb.rpc('get_guest_group',{p_guest_id:g.id});

  if(error||!data||!data.length){
    // Si algo falla, no dejamos a la persona atorada — la tratamos como individual
    selectedGuest=g;
    groupMembers=null;
    showSelectedGuest(g);
    return;
  }

  if(data.length<=1){
    selectedGuest=data[0]||g;
    groupMembers=null;
    showSelectedGuest(selectedGuest);
  } else {
    groupMembers=data.map(m=>({...m,attending:null}));
    selectedGuest=null;
    showGuestGroup();
  }
}

    document.getElementById('selected-guest-display').innerHTML=`${esc(g.guest_name)}<br><span style="font-weight:400;font-size:12px">${t.alreadyResponded}</span><br><span style="font-weight:400;font-size:12px">${t.yourResponseWas} <strong>${g.prev_attending?t.respondingYes:t.respondingNo}</strong></span>`;
    document.getElementById('rsvp-rest').style.display='none';
    if(editBtn){ editBtn.textContent=t.editMyResponse; editBtn.style.display='block'; }
    return;
  }

  if(editBtn) editBtn.style.display='none';
  document.getElementById('selected-guest-display').textContent=`${t.searchAreYouThisPerson} ${g.guest_name}`;
  document.getElementById('rsvp-rest').style.display='block';

  const guestsField=document.getElementById('r-guests');
  if(guestsField){
    guestsField.max=g.max_companions;
    const note=document.getElementById('max-companions-note');
    if(note) note.textContent=t.maxCompanionsNote.replace('{n}',g.max_companions);
  }
}

function startEditingRSVP(){
  if(!lastSelectedGuest) return;
  const g=lastSelectedGuest;
  editingGuestListId=g.id;

  document.getElementById('rsvp-rest').style.display='block';
  document.getElementById('btn-edit-rsvp').style.display='none';

  setAttending(g.prev_attending);
  const emailEl=document.getElementById('r-email'); if(emailEl) emailEl.value=g.prev_email||'';
  const guestsEl=document.getElementById('r-guests'); if(guestsEl) guestsEl.value=g.prev_guest_count||0;
  const dietaryEl=document.getElementById('r-dietary'); if(dietaryEl) dietaryEl.value=g.prev_dietary||'';
  const songEl=document.getElementById('r-song'); if(songEl) songEl.value=g.prev_song_request||'';
  if(g.prev_lodging_needed!==null&&g.prev_lodging_needed!==undefined) setLodging(g.prev_lodging_needed);
  const messageEl=document.getElementById('r-message'); if(messageEl) messageEl.value=g.prev_message||'';
  const customEl=document.getElementById('r-custom'); if(customEl) customEl.value=g.prev_custom_answer||'';
}

function showGuestGroup(){
  const t=T[lang];
  document.getElementById('field-name-search').style.display='none';
  document.getElementById('field-name-selected').style.display='block';
  // La asistencia ahora se marca por persona, no con el toggle único
  document.getElementById('field-attending-single').style.display='none';
  const guestsField=document.getElementById('field-guests');
  if(guestsField) guestsField.style.display='none';

  const rows=groupMembers.map((m,i)=>{
    if(m.already_responded){
      return `<div class="group-member-row"><span>${esc(m.guest_name)}</span><span class="group-member-done">${t.alreadyResponded}</span></div>`;
    }
    return `<div class="group-member-row">
      <span>${esc(m.guest_name)}</span>
      <div class="attend-toggle-mini">
        <button type="button" class="mini-btn" id="grp-yes-${i}" onclick="setGroupMemberAttending(${i},true)">${t.yes}</button>
        <button type="button" class="mini-btn" id="grp-no-${i}" onclick="setGroupMemberAttending(${i},false)">${t.no}</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('selected-guest-display').innerHTML=
    `<div style="font-weight:700;margin-bottom:.6rem">${esc(groupMembers[0].group_name)}</div>${rows}`;

  const anyPending=groupMembers.some(m=>!m.already_responded);
  document.getElementById('rsvp-rest').style.display=anyPending?'block':'none';
  document.getElementById('btn-submit').disabled=true; // se habilita cuando marquen al menos a alguien
}

function setGroupMemberAttending(i,val){
  groupMembers[i].attending=val;
  document.getElementById(`grp-yes-${i}`).classList.toggle('mini-sel-yes',val===true);
  document.getElementById(`grp-no-${i}`).classList.toggle('mini-sel-no',val===false);
  document.getElementById('btn-submit').disabled=!groupMembers.some(m=>m.attending!==null);
}

function resetGuestSearch(){
  selectedGuest=null;
  groupMembers=null;
  editingGuestListId=null;
  lastSelectedGuest=null;
  document.getElementById('field-name-search').style.display='block';
  document.getElementById('field-name-selected').style.display='none';
  document.getElementById('field-attending-single').style.display='block';
  document.getElementById('rsvp-rest').style.display='none';
  document.getElementById('r-name-search').value='';
  document.getElementById('guest-search-results').innerHTML='';
  const editBtn=document.getElementById('btn-edit-rsvp');
  if(editBtn) editBtn.style.display='none';
}

let attending=null;
let lodgingNeeded=null;
function setLodging(val){
  lodgingNeeded=val;
  document.getElementById('opt-lodging-yes').classList.toggle('sel-yes',val===true);
  document.getElementById('opt-lodging-no').classList.toggle('sel-no',val===false);
}
function setAttending(val){
  attending=val;
  document.getElementById('opt-yes').classList.toggle('sel-yes',val===true);
  document.getElementById('opt-no').classList.toggle('sel-no',val===false);
  ['field-guests','field-dietary','field-song','field-lodging','field-custom','field-message'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=(val===true)?'block':'none';
  });
  document.getElementById('btn-submit').disabled=false;
}

function renderThanksScreen(didAttend){
  const t=T[lang];
  document.getElementById('content').innerHTML=`
    <div class="thanks-card">
      <svg width="56" height="56" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:.75rem"><ellipse cx="18" cy="20" rx="2.2" ry="8" fill="#0D6E65"/><ellipse cx="18" cy="13" rx="2.8" ry="2.8" fill="#0D6E65"/><ellipse cx="10" cy="14" rx="8" ry="4" fill="#2EC4B6" opacity=".55" transform="rotate(-20 10 14)"/><ellipse cx="26" cy="14" rx="8" ry="4" fill="#7B2FBE" opacity=".55" transform="rotate(20 26 14)"/><ellipse cx="9" cy="18" rx="6.5" ry="3" fill="#2EC4B6" opacity=".35" transform="rotate(-10 9 18)"/><ellipse cx="27" cy="18" rx="6.5" ry="3" fill="#7B2FBE" opacity=".35" transform="rotate(10 27 18)"/></svg>
      <div class="thanks-emoji">${didAttend?'🎉':'💌'}</div>
      <h2>${didAttend?t.thanksYesTitle:t.thanksNoTitle}</h2>
      <p>${didAttend?t.thanksYesText:t.thanksNoText}</p>
      <div class="thanks-brand">DragonflAI Events</div>
    </div>`;
}

async function submitRSVP(e){
  e.preventDefault();
  const t=T[lang];
  const btn=document.getElementById('btn-submit');
  const isGroup=groupMembers!==null;

  // ── Modo grupo: una fila de RSVP por cada persona marcada ──
  if(isGroup){
    const pending=groupMembers.filter(m=>m.attending!==null);
    if(!pending.length){ showToast(t.toastNoAttend); return; }

    btn.disabled=true; btn.textContent=t.sendingBtn;

    const sharedEmail=document.getElementById('r-email').value.trim()||null;
    const sharedDietary=document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null;
    const sharedSong=document.getElementById('r-song')?document.getElementById('r-song').value.trim():null;
    const sharedLodging=document.getElementById('field-lodging')?lodgingNeeded:null;
    const sharedMessage=document.getElementById('r-message')?document.getElementById('r-message').value.trim():null;
    const sharedCustom=document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null;

    const payloads=pending.map(m=>({
      invitation_id: invitation.id,
      guest_list_id: m.id,
      guest_name: m.guest_name,
      guest_email: sharedEmail,
      attending: m.attending,
      guest_count: 0,
      dietary: sharedDietary,
      song_request: sharedSong,
      lodging_needed: sharedLodging,
      message: sharedMessage,
      custom_answer: sharedCustom
    }));

    const {error}=await sb.from('rsvps').insert(payloads);
    if(error){
      showToast(t.toastError);
      btn.disabled=false; btn.textContent=t.confirmBtn;
      return;
    }
    if(document.activeElement) document.activeElement.blur();
    renderThanksScreen(pending.some(m=>m.attending===true));
    return;
  }

  // ── Modo individual (comportamiento existente) ──
  const restricted=!!invitation.restrict_to_guest_list;
  const name=restricted?(selectedGuest?selectedGuest.guest_name:''):document.getElementById('r-name').value.trim();
  if(!name){ showToast(t.toastNoName); return; }
  if(attending===null){ showToast(t.toastNoAttend); return; }

  btn.disabled=true; btn.textContent=t.sendingBtn;

  // ── Editando una respuesta ya existente — vía la función segura, no un insert nuevo ──
  if(editingGuestListId){
    const {data,error}=await sb.rpc('update_my_rsvp',{
      p_guest_list_id: editingGuestListId,
      p_attending: attending,
      p_guest_email: document.getElementById('r-email').value.trim()||null,
      p_guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
      p_dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
      p_song_request: document.getElementById('r-song')?document.getElementById('r-song').value.trim():null,
      p_lodging_needed: document.getElementById('field-lodging')?lodgingNeeded:null,
      p_message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
      p_custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
    });
    if(error||!data?.success){
      showToast(t.toastError);
      btn.disabled=false; btn.textContent=t.confirmBtn;
      return;
    }
    if(document.activeElement) document.activeElement.blur();
    showToast(t.editSaved);
    renderThanksScreen(attending);
    return;
  }

  const payload={
    invitation_id: invitation.id,
    guest_list_id: restricted&&selectedGuest?selectedGuest.id:null,
    guest_name: name,
    guest_email: document.getElementById('r-email').value.trim()||null,
    attending,
    guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
    dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
    song_request: document.getElementById('r-song')?document.getElementById('r-song').value.trim():null,
    lodging_needed: document.getElementById('field-lodging')?lodgingNeeded:null,
    message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
    custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
  };

  const {error}=await sb.from('rsvps').insert(payload);
  if(error){
    showToast(t.toastError);
    btn.disabled=false; btn.textContent=t.confirmBtn;
    return;
  }

  if(document.activeElement) document.activeElement.blur();
  renderThanksScreen(attending);
}

// ── Galería de fotos del evento (subida por los invitados) ──
let eventPhotosList=[];

async function loadEventPhotos(){
  if(!invitation) return;
  const {data,error}=await sb.from('event_photos').select('id,photo_url,uploaded_by_name').eq('invitation_id',invitation.id).order('created_at',{ascending:false});
  const gallery=document.getElementById('event-photos-gallery');
  const emptyMsg=document.getElementById('event-photos-empty');
  if(!gallery) return;
  if(error||!data||!data.length){
    eventPhotosList=[];
    gallery.innerHTML='';
    if(emptyMsg) emptyMsg.style.display='block';
    return;
  }
  if(emptyMsg) emptyMsg.style.display='none';
  eventPhotosList=data;
  gallery.innerHTML=data.map((p,i)=>`
    <div style="position:relative">
      <img src="${esc(p.photo_url)}" class="gallery-img" loading="lazy" onclick="openPhotoLightbox(${i})" style="cursor:pointer">
      <a href="${esc(p.photo_url)}" download target="_blank" rel="noopener" style="position:absolute;bottom:4px;right:26px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;text-decoration:none">⬇</a>
      <button type="button" onclick="deleteEventPhoto('${p.id}')" style="position:absolute;bottom:4px;right:4px;background:rgba(200,50,50,.75);color:#fff;border:none;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer">✕</button>
    </div>
  `).join('');
}

let lightboxIndex=0;
function openPhotoLightbox(index){
  lightboxIndex=index;
  renderLightbox();
  document.addEventListener('keydown',lightboxKeyHandler);
}

function lightboxKeyHandler(e){
  if(e.key==='Escape') closePhotoLightbox();
  if(e.key==='ArrowRight') navLightbox(1);
  if(e.key==='ArrowLeft') navLightbox(-1);
}

function navLightbox(delta){
  const n=eventPhotosList.length;
  if(!n) return;
  lightboxIndex=(lightboxIndex+delta+n)%n;
  renderLightbox();
}

function closePhotoLightbox(){
  const overlay=document.getElementById('photo-lightbox-overlay');
  if(overlay) overlay.remove();
  document.removeEventListener('keydown',lightboxKeyHandler);
}

function renderLightbox(){
  const n=eventPhotosList.length;
  if(!n) return;
  const p=eventPhotosList[lightboxIndex];
  let overlay=document.getElementById('photo-lightbox-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='photo-lightbox-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.onclick=(e)=>{ if(e.target===overlay) closePhotoLightbox(); };
    document.body.appendChild(overlay);
  }
  const navBtn=(dir,label)=>`<button type="button" onclick="event.stopPropagation();navLightbox(${dir})" style="position:absolute;top:50%;${dir<0?'left':'right'}:16px;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">${label}</button>`;
  overlay.innerHTML=`
    <button type="button" onclick="event.stopPropagation();closePhotoLightbox()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer">✕</button>
    ${n>1?navBtn(-1,'‹'):''}
    <img src="${esc(p.photo_url)}" style="max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain" onclick="event.stopPropagation()">
    ${n>1?navBtn(1,'›'):''}
    ${n>1?`<div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#fff;font-size:12px;opacity:.8">${lightboxIndex+1} / ${n}</div>`:''}
  `;
}

async function deleteEventPhoto(photoId){
  const t=T[lang];
  if(!confirm(lang==='es'?'¿Borrar esta foto? No se puede deshacer.':'Delete this photo? This cannot be undone.')) return;
  const {error,count}=await sb.from('event_photos').delete().eq('id',photoId).select('id');
  if(error){
    console.error('deleteEventPhoto error:',error);
    // Un error 42501/PGRST301 aquí normalmente significa que falta una
    // política RLS de DELETE para invitados anónimos en event_photos.
    showToast(lang==='es'?'No se pudo borrar la foto (permiso denegado)':'Could not delete the photo (permission denied)');
    return;
  }
  loadEventPhotos();
}

async function uploadEventPhotos(event){
  const files=Array.from(event.target.files||[]);
  event.target.value='';
  if(!files.length||!invitation) return;
  const t=T[lang];

  let uploaded=0;
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    if(file.size>8*1024*1024) continue; // máximo 8 MB por foto

    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${invitation.id}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
    const {error:upErr}=await sb.storage.from('event-photos').upload(path,file,{upsert:false});
    if(upErr){ console.error(upErr); continue; }

    const {data:urlData}=sb.storage.from('event-photos').getPublicUrl(path);
    if(!urlData?.publicUrl) continue;

    const {error:insErr}=await sb.from('event_photos').insert({invitation_id:invitation.id,photo_url:urlData.publicUrl});
    if(!insErr) uploaded++;
  }

  if(uploaded>0){ showToast(t.photoUploaded); loadEventPhotos(); }
}

async function init(){
  if(!sb){ renderNotFound(); return; }
  const slug=getSlug();
  if(!slug){ renderNotFound(); return; }

  const {data,error}=await sb.from('invitations').select('*').eq('slug',slug).eq('is_published',true).single();
  if(error||!data){ renderNotFound(); return; }

  invitation=data;
  renderInvitation(data);
  loadEventPhotos();
}

init();
</script>
