// ══════════════════════════════
//  LOG DE ERRORES EN PRODUCCIÓN
//  Captura los errores de JavaScript que truenan en el navegador del
//  usuario y los guarda en Supabase (tabla error_log) — sin esto, solo
//  nos enteramos de los bugs si alguien se toma la molestia de reportarlos.
//  Protecciones: máx 10 errores por sesión, sin duplicados, textos
//  recortados, y jamás deja que el propio logger truene la app.
// ══════════════════════════════
(function(){
  let reported=0; const seen=new Set();
  function logJsError(message,source,line,col,stack){
    try{
      if(typeof sb==='undefined'||!sb||reported>=10) return;
      const key=String(message||'').slice(0,120);
      if(!key||seen.has(key)) return;
      seen.add(key); reported++;
      let uid=null; try{ uid=(typeof currentUser!=='undefined'&&currentUser)?currentUser.id:null; }catch(_){}
      sb.from('error_log').insert({
        page:location.pathname+location.search.slice(0,80),
        message:String(message||'').slice(0,1000),
        source:String(source||'').slice(0,300),
        line:Number.isFinite(line)?line:null,
        col:Number.isFinite(col)?col:null,
        stack:String(stack||'').slice(0,2000),
        user_agent:navigator.userAgent.slice(0,300),
        user_id:uid
      }).then(()=>{},()=>{});
    }catch(_){/* el logger nunca debe romper la app */}
  }
  window.addEventListener('error',e=>logJsError(e.message,e.filename,e.lineno,e.colno,e.error&&e.error.stack));
  window.addEventListener('unhandledrejection',e=>{
    const r=e&&e.reason||{};
    logJsError(r.message||String(e&&e.reason||'unhandled rejection'),'unhandledrejection',null,null,r.stack);
  });
})();

  let tok=localStorage.getItem('dflai_uploader_token');
  if(!tok){
    tok=(crypto.randomUUID&&crypto.randomUUID())||(Date.now()+'-'+Math.random().toString(36).slice(2));
    localStorage.setItem('dflai_uploader_token',tok);
  }
  return tok;
}

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toTitleCase(s){ return String(s??'').toLowerCase().replace(/(^|\s|&|-)\S/g,c=>c.toUpperCase()); }

// ── Agregar a mi calendario ──
// La hora se guarda como texto de exhibición ("6:00 PM – 11:00 PM"), no en
// formato de máquina — se extrae con regex; si no se puede leer, cae a un
// bloque razonable de 6pm-11pm en vez de fallar.
function parseEventTimeRange(eventTime){
  if(!eventTime) return null;
  const matches=[...String(eventTime).matchAll(/(\d{1,2}):(\d{2})\s*(AM|PM)/gi)];
  if(!matches.length) return null;
  const to24=(h,m,ap)=>{
    h=parseInt(h,10); m=parseInt(m,10);
    const isPM=/pm/i.test(ap);
    if(isPM&&h!==12) h+=12;
    if(!isPM&&h===12) h=0;
    return {h,m};
  };
  return {start:to24(matches[0][1],matches[0][2],matches[0][3]), end:matches[1]?to24(matches[1][1],matches[1][2],matches[1][3]):null};
}

function getEventDatesForCalendar(){
  const dateRaw=invitation?.event_date_raw;
  if(!dateRaw) return null;
  const parsed=parseEventTimeRange(invitation.event_time);
  const startDate=new Date(dateRaw+'T00:00:00');
  startDate.setHours(parsed?parsed.start.h:18, parsed?parsed.start.m:0, 0, 0);
  const endDate=new Date(dateRaw+'T00:00:00');
  if(parsed&&parsed.end) endDate.setHours(parsed.end.h, parsed.end.m, 0, 0);
  else endDate.setHours(23, 0, 0, 0);
  if(endDate<=startDate) endDate.setDate(endDate.getDate()+1); // cruza medianoche
  return {startDate,endDate};
}

function fmtICSDate(d){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;
}

function icsEscape(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function openGoogleCalendar(){
  const dates=getEventDatesForCalendar();
  if(!dates||!invitation){ showToast(lang==='es'?'No se pudo generar el evento':'Could not generate the event'); return; }
  const title=encodeURIComponent(invitation.host_names||(lang==='es'?'Evento':'Event'));
  const details=encodeURIComponent(lang==='es'?`Invitación de ${invitation.host_names||''}`:`Invitation from ${invitation.host_names||''}`);
  const location=encodeURIComponent(invitation.location||'');
  const datesParam=`${fmtICSDate(dates.startDate)}/${fmtICSDate(dates.endDate)}`;
  // ctz asume zona horaria de México por default — la mayoría de los eventos
  // publicados hoy son de ese mercado; ajustar si algún día se soporta
  // zona horaria explícita por evento.
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${datesParam}&details=${details}&location=${location}&ctz=America/Mexico_City`;
  window.open(url,'_blank');
  const menu=document.getElementById('cal-add-menu'); if(menu) menu.style.display='none';
}

function downloadIcsFile(){
  const dates=getEventDatesForCalendar();
  if(!dates||!invitation){ showToast(lang==='es'?'No se pudo generar el evento':'Could not generate the event'); return; }
  const uid=`${invitation.slug||'evento'}-${Date.now()}@dragonflaievents.com`;
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//DragonflAI Events//ES','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${fmtICSDate(new Date())}`,
    `DTSTART:${fmtICSDate(dates.startDate)}`,
    `DTEND:${fmtICSDate(dates.endDate)}`,
    `SUMMARY:${icsEscape(invitation.host_names||(lang==='es'?'Evento':'Event'))}`,
    invitation.location?`LOCATION:${icsEscape(invitation.location)}`:'',
    `DESCRIPTION:${icsEscape(lang==='es'?`Invitación de ${invitation.host_names||''}`:`Invitation from ${invitation.host_names||''}`)}`,
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${invitation.slug||'evento'}.ics`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  const menu=document.getElementById('cal-add-menu'); if(menu) menu.style.display='none';
}

function getSlug(){
  // Soporta: /nombre-evento (dominio propio, link corto), /i/nombre-evento
  // (compatibilidad con links viejos ya compartidos), y ?slug=nombre-evento (respaldo)
  const path=location.pathname.replace(/\/+$/,'');
  const parts=path.split('/').filter(Boolean);
  const idxI=parts.indexOf('i');
  if(idxI!==-1 && parts[idxI+1]) return decodeURIComponent(parts[idxI+1]);
  const knownPages=['index.html','terminos.html','aviso-de-privacidad.html','dragonflai-v2.html','invitacion.html','invitation-og.js','worker.js','app'];
  if(parts.length===1 && !knownPages.includes(parts[0])) return decodeURIComponent(parts[0]);
  const qs=new URLSearchParams(location.search);
  return qs.get('slug')||qs.get('i')||'';
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  const diff=Math.ceil((d-new Date())/(1000*60*60*24));
  return diff>=0?diff:null;
}

function extractRepresentativeColor(bgValue){
  // Si es un degradado, toma el primer color que aparezca en la definición
  const match=bgValue.match(/#[0-9a-fA-F]{3,8}/);
  return match?match[0]:'#FAF9F7';
}

function hexToRgba(hex,alpha){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const r=parseInt(hex.substring(0,2),16);
  const g=parseInt(hex.substring(2,4),16);
  const b=parseInt(hex.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

        <div id="rsvp-rest" ${restricted?'style="display:none"':''}>
          <div class="field">
            <label>${t.yourEmail}</label>
            <input type="text" id="r-email" placeholder="tu@correo.com">
          </div>
          <div class="field" id="field-attending-single">
            <label>${t.attendingQ}</label>
            <div class="attend-toggle">
              <div class="attend-opt" id="opt-yes" onclick="setAttending(true)">${t.yesAttend}</div>
              <div class="attend-opt" id="opt-no" onclick="setAttending(false)">${t.noAttend}</div>
            </div>
          </div>
          ${inv.ask_guest_count?`<div class="field" id="field-guests" style="display:none">
            <label>${t.guestCount}</label>

            <p id="max-companions-note" style="font-size:11px;color:var(--text-3);margin-top:.3rem"></p>

            <label>${t.dietary}</label>
            <input type="text" id="r-dietary" placeholder="${t.dietaryPh}">
          </div>`:''}
          ${inv.ask_song_request?`<div class="field" id="field-song" style="display:none">
            <label>${t.songRequest}</label>
            <input type="text" id="r-song" placeholder="${t.songPh}">
          </div>`:''}
          ${inv.ask_lodging_need?`<div class="field" id="field-lodging" style="display:none">
            <label>${t.lodgingQ}</label>
            <div class="attend-toggle">
              <div class="attend-opt" id="opt-lodging-yes" onclick="setLodging(true)">${t.yes}</div>
              <div class="attend-opt" id="opt-lodging-no" onclick="setLodging(false)">${t.no}</div>
            </div>
          </div>`:''}
          ${inv.custom_question?`<div class="field" id="field-custom" style="display:none">
            <label>${esc(inv.custom_question)}</label>
            <input type="text" id="r-custom">
          </div>`:''}
          ${inv.ask_message?`<div class="field" id="field-message" style="display:none">
            <label>${t.messageLabel}</label>
            <textarea id="r-message" placeholder="${t.messagePh}"></textarea>
          </div>`:''}
          <button type="submit" class="btn-submit" id="btn-submit" disabled>${t.confirmBtn}</button>
        </div>
      </form>
      </div>
     </div>
    </div>`;

  document.getElementById('rsvp-form').addEventListener('submit',submitRSVP);
  if(restricted && selectedGuest) showSelectedGuest(selectedGuest);
  if(attending!==null) setAttending(attending);
  if(lodgingNeeded!==null && document.getElementById('opt-lodging-yes')) setLodging(lodgingNeeded);
}

function openRsvpModal(){
  const overlay=document.getElementById('rsvp-modal-overlay');
  if(overlay) overlay.style.display='flex';
  document.body.style.overflow='hidden';
}

function closeRsvpModal(){
  const overlay=document.getElementById('rsvp-modal-overlay');
  if(overlay) overlay.style.display='none';
  document.body.style.overflow='';
}

async function onGuestSearchInput(){
  const q=document.getElementById('r-name-search').value.trim();
  const resultsEl=document.getElementById('guest-search-results');
  clearTimeout(guestSearchTimer);
  if(q.length<2){ resultsEl.innerHTML=''; return; }
  guestSearchTimer=setTimeout(async()=>{
    const {data,error}=await sb.rpc('search_guest_list',{p_invitation_id:invitation.id,p_query:q});
    if(error||!data||!data.length){
      resultsEl.innerHTML=`<div style="background:var(--cream-2);border:1.5px solid var(--border-gray);border-radius:var(--radius);padding:12px 14px;margin-top:.6rem;font-size:13.5px;color:var(--text-2);line-height:1.5">${T[lang].searchNoResults}</div>`;
      return;
    }
    lastSearchResults=data;
    resultsEl.innerHTML=data.map((g,i)=>`<div class="guest-match" onclick="selectGuestMatch(${i})">${esc(g.guest_name)}</div>`).join('');
  },350);
}

let groupMembers=null; // null = modo individual normal; array = modo grupo activo

async function selectGuestMatch(i){
  const g=lastSearchResults[i];
  const {data,error}=await sb.rpc('get_guest_group',{p_guest_id:g.id});

  if(error||!data||!data.length){
    // Si algo falla, no dejamos a la persona atorada — la tratamos como individual
    selectedGuest=g;
    groupMembers=null;
    showSelectedGuest(g);
    return;
  }

  if(data.length<=1){
    selectedGuest=data[0]||g;
    groupMembers=null;
    showSelectedGuest(selectedGuest);
  } else {
    groupMembers=data.map(m=>({...m,attending:null}));
    selectedGuest=null;
    showGuestGroup();
  }
}

let editingGuestListId=null;
let lastSelectedGuest=null;

function showSelectedGuest(g){
  const t=T[lang];
  lastSelectedGuest=g;
  editingGuestListId=null;
  document.getElementById('field-name-search').style.display='none';
  document.getElementById('field-name-selected').style.display='block';
  document.getElementById('field-attending-single').style.display='block';
  const editBtn=document.getElementById('btn-edit-rsvp');

  if(g.already_responded){
    document.getElementById('selected-guest-display').innerHTML=`${esc(g.guest_name)}<br><span style="font-weight:400;font-size:12px">${t.alreadyResponded}</span><br><span style="font-weight:400;font-size:12px">${t.yourResponseWas} <strong>${g.prev_attending?t.respondingYes:t.respondingNo}</strong></span>`;
    document.getElementById('rsvp-rest').style.display='none';
    if(editBtn){ editBtn.textContent=t.editMyResponse; editBtn.style.display='block'; }
    return;
  }

  if(editBtn) editBtn.style.display='none';

    if(note) note.textContent=t.maxCompanionsNote.replace('{n}',g.max_companions);

}

function startEditingRSVP(){
  if(!lastSelectedGuest) return;
  const g=lastSelectedGuest;
  editingGuestListId=g.id;

  document.getElementById('rsvp-rest').style.display='block';
  document.getElementById('btn-edit-rsvp').style.display='none';

  setAttending(g.prev_attending);
  const emailEl=document.getElementById('r-email'); if(emailEl) emailEl.value=g.prev_email||'';
  const guestsEl=document.getElementById('r-guests'); if(guestsEl) guestsEl.value=g.prev_guest_count||0;
  const dietaryEl=document.getElementById('r-dietary'); if(dietaryEl) dietaryEl.value=g.prev_dietary||'';
  const songEl=document.getElementById('r-song'); if(songEl) songEl.value=g.prev_song_request||'';
  if(g.prev_lodging_needed!==null&&g.prev_lodging_needed!==undefined) setLodging(g.prev_lodging_needed);
  const messageEl=document.getElementById('r-message'); if(messageEl) messageEl.value=g.prev_message||'';
  const customEl=document.getElementById('r-custom'); if(customEl) customEl.value=g.prev_custom_answer||'';
}

function showGuestGroup(){
  const t=T[lang];
  document.getElementById('field-name-search').style.display='none';
  document.getElementById('field-name-selected').style.display='block';
  // La asistencia ahora se marca por persona, no con el toggle único
  document.getElementById('field-attending-single').style.display='none';
  const guestsField=document.getElementById('field-guests');
  if(guestsField) guestsField.style.display='none';

  const rows=groupMembers.map((m,i)=>{
    if(m.already_responded){
      return `<div class="group-member-row"><span>${esc(m.guest_name)}</span><span class="group-member-done">${t.alreadyResponded}</span></div>`;
    }
    return `<div class="group-member-row">
      <span>${esc(m.guest_name)}</span>
      <div class="attend-toggle-mini">
        <button type="button" class="mini-btn" id="grp-yes-${i}" onclick="setGroupMemberAttending(${i},true)">${t.yes}</button>
        <button type="button" class="mini-btn" id="grp-no-${i}" onclick="setGroupMemberAttending(${i},false)">${t.no}</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('selected-guest-display').innerHTML=
    `<div style="font-weight:700;margin-bottom:.6rem">${esc(groupMembers[0].group_name)}</div>${rows}`;

  const anyPending=groupMembers.some(m=>!m.already_responded);
  document.getElementById('rsvp-rest').style.display=anyPending?'block':'none';
  // En modo grupo estas preguntas son compartidas para todo el grupo (no
  // por persona) — antes se quedaban escondidas para siempre porque solo
  // setAttending() (modo individual) las revelaba.
  ['field-dietary','field-song','field-lodging','field-custom','field-message'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=anyPending?'block':'none';
  });

}

  document.getElementById(`grp-no-${i}`).classList.toggle('mini-sel-no',val===false);

async function submitRSVP(e){
  e.preventDefault();
  const t=T[lang];
  const btn=document.getElementById('btn-submit');
  const isGroup=groupMembers!==null;

  // ── Modo grupo: una fila de RSVP por cada persona marcada ──
  if(isGroup){
    const pending=groupMembers.filter(m=>m.attending!==null);
    if(!pending.length){ showToast(t.toastNoAttend); return; }

    btn.disabled=true; btn.textContent=t.sendingBtn;

    const sharedEmail=document.getElementById('r-email').value.trim()||null;
    const sharedDietary=document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null;
    const sharedSong=document.getElementById('r-song')?document.getElementById('r-song').value.trim():null;
    const sharedLodging=document.getElementById('field-lodging')?lodgingNeeded:null;
    const sharedMessage=document.getElementById('r-message')?document.getElementById('r-message').value.trim():null;
    const sharedCustom=document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null;

    const payloads=pending.map(m=>({
      invitation_id: invitation.id,
      guest_list_id: m.id,
      guest_name: m.guest_name,
      guest_email: sharedEmail,
      attending: m.attending,
      guest_count: 0,
      dietary: sharedDietary,
      song_request: sharedSong,
      lodging_needed: sharedLodging,
      message: sharedMessage,
      custom_answer: sharedCustom
    }));

    const {error}=await sb.from('rsvps').insert(payloads);
    if(error){
      showToast(t.toastError);
      btn.disabled=false; btn.textContent=t.confirmBtn;
      return;
    }
    if(document.activeElement) document.activeElement.blur();
    renderThanksScreen(pending.some(m=>m.attending===true));
    return;
  }

  // ── Modo individual (comportamiento existente) ──
  const restricted=!!invitation.restrict_to_guest_list;
  const name=restricted?(selectedGuest?selectedGuest.guest_name:''):document.getElementById('r-name').value.trim();
  if(!name){ showToast(t.toastNoName); return; }
  if(attending===null){ showToast(t.toastNoAttend); return; }

  btn.disabled=true; btn.textContent=t.sendingBtn;

  // ── Editando una respuesta ya existente — vía la función segura, no un insert nuevo ──
  if(editingGuestListId){
    const {data,error}=await sb.rpc('update_my_rsvp',{
      p_guest_list_id: editingGuestListId,
      p_attending: attending,
      p_guest_email: document.getElementById('r-email').value.trim()||null,
      p_guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
      p_dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
      p_song_request: document.getElementById('r-song')?document.getElementById('r-song').value.trim():null,
      p_lodging_needed: document.getElementById('field-lodging')?lodgingNeeded:null,
      p_message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
      p_custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
    });
    if(error||!data?.success){
      showToast(t.toastError);
      btn.disabled=false; btn.textContent=t.confirmBtn;
      return;
    }
    if(document.activeElement) document.activeElement.blur();
    showToast(t.editSaved);
    renderThanksScreen(attending);
    return;
  }

  const payload={
    invitation_id: invitation.id,
    guest_list_id: restricted&&selectedGuest?selectedGuest.id:null,
    guest_name: name,
    guest_email: document.getElementById('r-email').value.trim()||null,
    attending,
    guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
    dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
    song_request: document.getElementById('r-song')?document.getElementById('r-song').value.trim():null,
    lodging_needed: document.getElementById('field-lodging')?lodgingNeeded:null,
    message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
    custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
  };

  const {error}=await sb.from('rsvps').insert(payload);
  if(error){
    showToast(t.toastError);
    btn.disabled=false; btn.textContent=t.confirmBtn;
    return;
  }

  if(document.activeElement) document.activeElement.blur();
  renderThanksScreen(attending);
}

// ── Galería de fotos del evento (subida por los invitados) ──
let eventPhotosList=[];
const GALLERY_PREVIEW_COUNT=6; // cuántas miniaturas se muestran en la tarjeta principal

async function loadEventPhotos(){
  if(!invitation) return;
  const {data,error}=await sb.from('event_photos').select('id,photo_url,uploaded_by_name,uploader_token').eq('invitation_id',invitation.id).order('created_at',{ascending:false});
  const gallery=document.getElementById('event-photos-gallery');
  const emptyMsg=document.getElementById('event-photos-empty');
  const viewAllBtn=document.getElementById('event-photos-viewall');
  const downloadAllBtn=document.getElementById('event-photos-downloadall');
  if(!gallery) return;
  if(error||!data||!data.length){
    eventPhotosList=[];
    gallery.innerHTML='';
    if(emptyMsg) emptyMsg.style.display='block';
    if(viewAllBtn) viewAllBtn.style.display='none';
    if(downloadAllBtn) downloadAllBtn.style.display='none';
    return;
  }
  if(emptyMsg) emptyMsg.style.display='none';
  eventPhotosList=data;
  const preview=data.slice(0,GALLERY_PREVIEW_COUNT);
  gallery.innerHTML=preview.map((p,i)=>galleryThumbHTML(p,i)).join('');
  if(viewAllBtn){
    const L=lang==='es';
    if(data.length>0){
      viewAllBtn.style.display='inline-block';
      viewAllBtn.textContent=L?`🖼️ Ver todas las fotos (${data.length})`:`🖼️ View all photos (${data.length})`;
    } else {
      viewAllBtn.style.display='none';
    }
  }
  if(downloadAllBtn){
    if(data.length>0){
      downloadAllBtn.style.display='inline-block';
      downloadAllBtn.textContent='⬇️ '+T[lang].downloadAllBtn;
    } else {
      downloadAllBtn.style.display='none';
    }
  }
}

function galleryThumbHTML(p,i){
  const canDelete=isHost||(p.uploader_token&&p.uploader_token===getUploaderToken());
  const deleteBtn=canDelete?`<button type="button" onclick="event.stopPropagation();deleteEventPhoto('${p.id}')" title="${T[lang].confirmDeletePhoto}" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;padding:0">✕</button>`:'';
  return `
    <div style="position:relative">
      <img src="${esc(p.photo_url)}" class="gallery-img" loading="lazy" onclick="openPhotoLightbox(${i})" style="cursor:pointer">
      <a href="${esc(p.photo_url)}" download target="_blank" rel="noopener" style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;text-decoration:none">⬇</a>
      ${deleteBtn}
    </div>
  `;
}

// Borra una foto de la galería — de la base de datos Y del archivo real en
// Storage (sin esto, el registro desaparece pero el archivo queda huérfano
// ocupando espacio para siempre). Mismo nivel de confianza que subir fotos:
// cualquiera con el link puede borrar cualquier foto, ya que no se rastrea
// identidad de invitado a nivel de cuenta.
async function deleteEventPhoto(photoId){
  const t=T[lang];
  if(!confirm(t.confirmDeletePhoto)) return;
  try{
    const {data,error}=await sb.rpc('delete_event_photo',{p_photo_id:photoId,p_uploader_token:getUploaderToken()});
    if(error||!data?.success){
      showToast(t.photoDeleteError);
      return;
    }

    closePhotoLightbox();
    loadEventPhotos();
    // Si el modal de galería completa está abierto, refrescarlo también
    const overlay=document.getElementById('full-gallery-overlay');
    if(overlay&&overlay.style.display!=='none'&&overlay.innerHTML) openFullGalleryView();
    showToast(t.photoDeleted);
  }catch(e){
    console.error('Error borrando la foto:',e);
    showToast(t.photoDeleteError);
  }
}

// único modo de guardarlas era una por una con el botón ⬇ de cada miniatura,
// tedioso en cuanto hay más de un puñado de fotos.
async function downloadAllEventPhotos(){
  const t=T[lang];
  if(!eventPhotosList.length) return;
  if(typeof JSZip==='undefined'){ showToast(t.downloadZipError); return; }

  const btns=[...document.querySelectorAll('.photos-downloadall-btn')];
  if(!btns.length) return;
  if(btns[0].disabled) return; // ya en proceso — evita doble clic en cualquiera de los dos botones
  const originalLabels=btns.map(b=>b.textContent);
  btns.forEach(b=>{ b.disabled=true; b.style.opacity='.6'; b.style.cursor='wait'; });
  showToast(t.downloadingZip);

  try{
    const zip=new JSZip();
    let done=0;
    for(const photo of eventPhotosList){
      try{
        const res=await fetch(photo.photo_url);
        if(!res.ok) throw new Error('fetch failed: '+res.status);
        const blob=await res.blob();
        const ext=(photo.photo_url.split('.').pop()||'jpg').split('?')[0].slice(0,4);
        zip.file(`foto-${String(done+1).padStart(3,'0')}.${ext}`,blob);
      }catch(e){
        // Una foto que falle (link roto, red lenta) no debe tronar la
        // descarga completa — se omite y seguimos con las demás.
        console.error('No se pudo incluir una foto en el zip:',e);
      }
      done++;
      const label=t.downloadZipProgress(Math.round((done/eventPhotosList.length)*100));
      btns.forEach(b=>{ b.textContent=label; });
    }

    const content=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(content);
    const a=document.createElement('a');
    a.href=url;
    a.download=`fotos-${(invitation?.host_names||'evento').replace(/[^\w]+/g,'-')}.zip`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast(t.downloadZipDone);
  }catch(e){
    console.error('Error generando el zip de fotos:',e);
    showToast(t.downloadZipError);
  }finally{
    btns.forEach((b,i)=>{ b.disabled=false; b.style.opacity=''; b.style.cursor=''; b.textContent=originalLabels[i]; });
  }
}

function openFullGalleryView(){
  const L=lang==='es';
  let overlay=document.getElementById('full-gallery-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='full-gallery-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.onclick=(e)=>{ if(e.target===overlay) closeFullGalleryView(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML=`
    <div style="background:#fff;border-radius:16px;padding:1.5rem;max-width:900px;width:100%;max-height:88vh;overflow-y:auto;box-sizing:border-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:10px;flex-wrap:wrap">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:20px;margin:0">${L?'Todas las fotos':'All photos'} (${eventPhotosList.length})</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <button type="button" class="extra-link-btn photos-downloadall-btn" style="border:none;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap" onclick="downloadAllEventPhotos()">⬇️ ${L?'Descargar todas':'Download all'}</button>
          <button type="button" onclick="closeFullGalleryView()" style="background:var(--cream-2);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;flex-shrink:0">✕</button>
        </div>
      </div>
      <div class="gallery-grid" style="grid-template-columns:repeat(auto-fill,minmax(110px,1fr))">
        ${eventPhotosList.map((p,i)=>galleryThumbHTML(p,i)).join('')}
      </div>
    </div>
  `;
}

function closeFullGalleryView(){
  const overlay=document.getElementById('full-gallery-overlay');
  if(overlay) overlay.remove();
}

let lightboxIndex=0;
function openPhotoLightbox(index){
  lightboxIndex=index;
  renderLightbox();
  document.addEventListener('keydown',lightboxKeyHandler);
}

function lightboxKeyHandler(e){
  if(e.key==='Escape') closePhotoLightbox();
  if(e.key==='ArrowRight') navLightbox(1);
  if(e.key==='ArrowLeft') navLightbox(-1);
}

function navLightbox(delta){
  const n=eventPhotosList.length;
  if(!n) return;
  lightboxIndex=(lightboxIndex+delta+n)%n;
  renderLightbox();
}

function closePhotoLightbox(){
  const overlay=document.getElementById('photo-lightbox-overlay');
  if(overlay) overlay.remove();
  document.removeEventListener('keydown',lightboxKeyHandler);
}

function renderLightbox(){
  const n=eventPhotosList.length;
  if(!n) return;
  const p=eventPhotosList[lightboxIndex];
  let overlay=document.getElementById('photo-lightbox-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='photo-lightbox-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.onclick=(e)=>{ if(e.target===overlay) closePhotoLightbox(); };
    document.body.appendChild(overlay);
  }
  const navBtn=(dir,label)=>`<button type="button" onclick="event.stopPropagation();navLightbox(${dir})" style="position:absolute;top:50%;${dir<0?'left':'right'}:16px;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">${label}</button>`;
  const canDelete=isHost||(p.uploader_token&&p.uploader_token===getUploaderToken());
  const deleteBtn=canDelete?`<button type="button" onclick="event.stopPropagation();deleteEventPhoto('${p.id}')" title="${T[lang].confirmDeletePhoto}" style="position:absolute;top:16px;right:60px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:15px;cursor:pointer">🗑️</button>`:'';
  overlay.innerHTML=`
    <button type="button" onclick="event.stopPropagation();closePhotoLightbox()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer">✕</button>
    ${deleteBtn}
    ${n>1?navBtn(-1,'‹'):''}
    <img src="${esc(p.photo_url)}" style="max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain" onclick="event.stopPropagation()">
    ${n>1?navBtn(1,'›'):''}
    ${n>1?`<div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#fff;font-size:12px;opacity:.8">${lightboxIndex+1} / ${n}</div>`:''}
  `;
}

async function uploadEventPhotos(event){
  const files=Array.from(event.target.files||[]);
  event.target.value='';
  if(!files.length||!invitation) return;
  const t=T[lang];

  let uploaded=0;
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    if(file.size>8*1024*1024) continue; // máximo 8 MB por foto

    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${invitation.id}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
    const {error:upErr}=await sb.storage.from('event-photos').upload(path,file,{upsert:false});
    if(upErr){ console.error(upErr); continue; }

    const {data:urlData}=sb.storage.from('event-photos').getPublicUrl(path);
    if(!urlData?.publicUrl) continue;

    const {error:insErr}=await sb.from('event_photos').insert({invitation_id:invitation.id,photo_url:urlData.publicUrl,uploader_token:getUploaderToken()});
    if(!insErr) uploaded++;
  }

  if(uploaded>0){ showToast(t.photoUploaded); loadEventPhotos(); }
}

async function init(){
  if(!sb){ renderNotFound(); return; }
  const slug=getSlug();
  if(!slug){ renderNotFound(); return; }

  // La tabla invitations ya no es legible directo (evita que cualquiera
  // pueda enumerar todas las invitaciones de la plataforma). Este RPC
  // solo entrega datos si conoces el slug exacto.
  const {data,error}=await sb.rpc('get_public_invitation',{p_slug:slug});
  const row=Array.isArray(data)&&data[0];
  if(error||!row){ renderNotFound(); return; }

  invitation=row;

  // ¿El visitante ya inició sesión en la app principal en este mismo
  // navegador? Si es el dueño de ESTA invitación, puede borrar cualquier
  // foto de la galería, no solo las que él mismo subió.
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session?.user){
      const {data:ownerCheck}=await sb.rpc('is_invitation_owner',{p_invitation_id:invitation.id});
      isHost=!!ownerCheck;
    }
  }catch(e){ console.error('No se pudo verificar si es el anfitrión:',e); }

  renderInvitation(row);
  loadEventPhotos();
}

init();
</script>
