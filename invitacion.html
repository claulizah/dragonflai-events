<style>
:root{
  --teal:#2EC4B6; --teal-dark:#0D6E65; --teal-light:#EAF7F6;
  --violet:#7B2FBE; --violet-light:#F3EAFB;
  --night:#0D1B2A; --night-2:#152238;
  --text:#1A2332; --text-2:#4A5568; --text-3:#8A94A6;
  --white:#FFFFFF; --cream:#FAF9F7; --cream-2:#F5F3EF;
  --border-gray:#E5E1D8; --radius:14px; --radius-lg:22px;
  --shadow-md:0 8px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.wrap{max-width:560px;width:100%}
.brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:2rem;opacity:.7}
.brand span{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text-2)}

/* ── TARJETA (mismos temas que el Save the Date de la app) ── */
.card{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:3rem 2rem;text-align:center;background:#FFFFFF;border:1px solid var(--border-gray);box-shadow:var(--shadow-md);margin-bottom:1.5rem}
.card.theme-teal .eyebrow,.card.theme-teal .hashtag{color:var(--teal-dark)}
.card.theme-blush .eyebrow,.card.theme-blush .hashtag{color:#C14A5E}
.card.theme-gold .eyebrow,.card.theme-gold .hashtag{color:#B8860B}
.card.theme-sage .eyebrow,.card.theme-sage .hashtag{color:#5A7C52}
.card.theme-night .eyebrow,.card.theme-night .hashtag{color:#1A2332}
.card.theme-blanco .eyebrow,.card.theme-blanco .hashtag{color:var(--text-3)}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:1rem;font-weight:600}
.names{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,7vw,3.2rem);font-weight:600;line-height:1.15;margin-bottom:1rem;color:var(--text)}
.divider{width:60px;height:1px;background:var(--border-gray);margin:0 auto 1.2rem}
.details{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem;font-size:14.5px;color:var(--text-2)}
.detail-item{display:flex;align-items:center;justify-content:center;gap:6px}
.msg{font-size:13px;color:var(--text-2);font-style:italic;margin-top:.5rem}
.hashtag{font-size:13px;color:var(--teal-dark);font-weight:600;margin-top:.6rem}
.countdown{display:flex;justify-content:center;gap:1.5rem;margin-top:1.5rem}
.cd-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--teal-dark)}
.cd-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}

/* ── RSVP ── */
.rsvp-card{background:var(--white);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-md)}
.rsvp-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;text-align:center;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:.4rem}
.field input[type=text],.field input[type=number],.field textarea{width:100%;padding:11px;border-radius:var(--radius);border:1.5px solid var(--border-gray);font-family:'Inter',sans-serif;font-size:14px;background:var(--cream-2)}
.field textarea{resize:vertical;min-height:70px}
.attend-toggle{display:flex;gap:10px}
.attend-opt{flex:1;padding:14px;border-radius:var(--radius);border:1.5px solid var(--border-gray);text-align:center;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;background:var(--cream-2);color:var(--text-2)}
.attend-opt.sel-yes{background:var(--teal);border-color:var(--teal);color:#fff}
.attend-opt.sel-no{background:#E8637A;border-color:#E8637A;color:#fff}
.btn-submit{width:100%;padding:14px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--teal),var(--violet));color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:.5rem}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.state-msg{text-align:center;padding:3rem 1rem;color:var(--text-2)}
.state-msg h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);margin-bottom:.5rem}
.thanks-card{text-align:center;padding:3rem 2rem;background:linear-gradient(135deg,var(--teal-light),var(--violet-light));border-radius:var(--radius-lg);box-shadow:var(--shadow-md);cursor:default}
.thanks-emoji{font-size:52px;margin-bottom:.5rem}
.thanks-card h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);margin-bottom:.6rem}
.thanks-card p{font-size:15px;color:var(--text-2)}
.thanks-brand{margin-top:1.5rem;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--teal-dark);letter-spacing:.03em}
.planner-watermark{margin-top:1.2rem;font-size:10px;color:var(--text-3);letter-spacing:.03em;opacity:.6}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--night);color:#fff;padding:12px 20px;border-radius:100px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s;z-index:100}
.toast.show{opacity:1}
.lang-toggle{display:flex;justify-content:center;gap:6px;margin-bottom:1rem}
.lang-btn{padding:4px 12px;border-radius:100px;border:1px solid var(--border-gray);background:var(--white);color:var(--text-2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);font-weight:600}
.guest-match{padding:10px 12px;border:1.5px solid var(--border-gray);border-radius:var(--radius);margin-top:6px;cursor:pointer;font-size:13.5px;transition:all .15s}
.guest-match:hover{border-color:var(--teal);background:var(--teal-light)}
</style>
</head>

function setLang(l){
  lang=l;
  document.getElementById('btn-es').className='lang-btn'+(l==='es'?' active':'');
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' active':'');
  document.documentElement.lang=l;
  const loadingText=document.getElementById('loading-text');
  if(loadingText) loadingText.textContent=T[lang].loading;
  document.getElementById('footer-terms').textContent=T[lang].footerTerms;
  document.getElementById('footer-privacy').textContent=T[lang].footerPrivacy;
  // Si ya hay una invitación cargada, volver a pintarla en el nuevo idioma
  if(invitation) renderInvitation(invitation);
}

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

function getSlug(){
  // Soporta tanto /i/mi-slug (URL bonita vía _redirects) como ?slug=mi-slug (respaldo)
  const path=location.pathname.replace(/\/+$/,'');
  const parts=path.split('/').filter(Boolean);
  const idxI=parts.indexOf('i');
  if(idxI!==-1 && parts[idxI+1]) return decodeURIComponent(parts[idxI+1]);
  const qs=new URLSearchParams(location.search);
  return qs.get('slug')||qs.get('i')||'';
}

function renderNotFound(){
  document.getElementById('content').innerHTML=`
    <div class="state-msg">
      <h2>${T[lang].notFoundTitle}</h2>
      <p>${T[lang].notFoundText}</p>
    </div>`;
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  const diff=Math.ceil((d-new Date())/(1000*60*60*24));
  return diff>=0?diff:null;
}

let selectedGuest=null;
let lastSearchResults=[];
let guestSearchTimer=null;

function renderInvitation(inv){
  const days=daysUntil(inv.event_date_raw);
  const t=T[lang];
  const restricted=!!inv.restrict_to_guest_list;
  document.getElementById('content').innerHTML=`
    <div class="card ${esc(inv.theme||'theme-teal')}">
      <div class="eyebrow">— ${inv.event_type?esc(inv.event_type):t.invitedFallback} —</div>
      <div class="names">${esc(inv.host_names)}</div>
      <div class="divider"></div>
      <div class="details">
        ${inv.event_date?`<div class="detail-item">📅 ${esc(inv.event_date)}</div>`:''}
        ${inv.location?`<div class="detail-item">📍 ${esc(inv.location)}</div>`:''}
        ${inv.event_time?`<div class="detail-item">🕕 ${esc(inv.event_time)}</div>`:''}
        ${inv.dress_code?`<div class="detail-item">👔 ${esc(inv.dress_code)}</div>`:''}
        ${inv.directions_info?`<div class="detail-item">🗺️ ${esc(inv.directions_info)}</div>`:''}
      </div>
      ${inv.message?`<div class="msg">${esc(inv.message)}</div>`:''}
      ${inv.hashtag?`<div class="hashtag">${esc(inv.hashtag)}</div>`:''}
      ${days!==null?`<div class="countdown"><div><div class="cd-num">${days}</div><div class="cd-lbl">${t.daysLabel}</div></div></div>`:''}
      ${inv.published_via_planner?`<div class="planner-watermark">Powered by DragonflAI Events</div>`:''}
    </div>

    <div class="rsvp-card">
      <div class="rsvp-title">${t.rsvpTitle}</div>
      <form id="rsvp-form">
        ${restricted?`
        <div class="field" id="field-name-search">
          <label>${t.yourName}</label>
          <p style="font-size:11px;color:var(--text-3);margin:-.2rem 0 .5rem">${t.searchHint}</p>
          <input type="text" id="r-name-search" placeholder="${t.searchNamePlaceholder}" oninput="onGuestSearchInput()" autocomplete="off">
          <div id="guest-search-results"></div>
        </div>
        <div class="field" id="field-name-selected" style="display:none">
          <div id="selected-guest-display" style="padding:11px;border-radius:var(--radius);background:var(--teal-light);border:1.5px solid var(--teal);font-weight:600;font-size:14px"></div>
          <a href="#" onclick="resetGuestSearch();return false" style="font-size:11.5px;color:var(--text-3);display:inline-block;margin-top:.5rem">${t.changeNameLink}</a>
        </div>
        `:`
        <div class="field">
          <label>${t.yourName}</label>
          <input type="text" id="r-name" required>
        </div>
        `}

        <div id="rsvp-rest" ${restricted?'style="display:none"':''}>
          <div class="field">
            <label>${t.yourEmail}</label>
            <input type="text" id="r-email" placeholder="tu@correo.com">
          </div>
          <div class="field">
            <label>${t.attendingQ}</label>
            <div class="attend-toggle">
              <div class="attend-opt" id="opt-yes" onclick="setAttending(true)">${t.yesAttend}</div>
              <div class="attend-opt" id="opt-no" onclick="setAttending(false)">${t.noAttend}</div>
            </div>
          </div>
          ${inv.ask_guest_count?`<div class="field" id="field-guests" style="display:none">
            <label>${t.guestCount}</label>
            <input type="number" id="r-guests" min="0" value="0">
            <p id="max-companions-note" style="font-size:11px;color:var(--text-3);margin-top:.3rem"></p>
          </div>`:''}
          ${inv.ask_dietary?`<div class="field" id="field-dietary" style="display:none">
            <label>${t.dietary}</label>
            <input type="text" id="r-dietary" placeholder="${t.dietaryPh}">
          </div>`:''}
          ${inv.ask_song_request?`<div class="field" id="field-song" style="display:none">
            <label>${t.songRequest}</label>
            <input type="text" id="r-song" placeholder="${t.songPh}">
          </div>`:''}
          ${inv.ask_lodging_need?`<div class="field" id="field-lodging" style="display:none">
            <label>${t.lodgingQ}</label>
            <div class="attend-toggle">
              <div class="attend-opt" id="opt-lodging-yes" onclick="setLodging(true)">${t.yes}</div>
              <div class="attend-opt" id="opt-lodging-no" onclick="setLodging(false)">${t.no}</div>
            </div>
          </div>`:''}
          ${inv.custom_question?`<div class="field" id="field-custom" style="display:none">
            <label>${esc(inv.custom_question)}</label>
            <input type="text" id="r-custom">
          </div>`:''}
          ${inv.ask_message?`<div class="field" id="field-message" style="display:none">
            <label>${t.messageLabel}</label>
            <textarea id="r-message" placeholder="${t.messagePh}"></textarea>
          </div>`:''}
          <button type="submit" class="btn-submit" id="btn-submit" disabled>${t.confirmBtn}</button>
        </div>

  if(attending!==null) setAttending(attending);
  if(lodgingNeeded!==null && document.getElementById('opt-lodging-yes')) setLodging(lodgingNeeded);
}

async function onGuestSearchInput(){
  const q=document.getElementById('r-name-search').value.trim();
  const resultsEl=document.getElementById('guest-search-results');
  clearTimeout(guestSearchTimer);
  if(q.length<2){ resultsEl.innerHTML=''; return; }
  guestSearchTimer=setTimeout(async()=>{
    const {data,error}=await sb.rpc('search_guest_list',{p_invitation_id:invitation.id,p_query:q});
    if(error||!data||!data.length){
      resultsEl.innerHTML=`<p style="font-size:12px;color:var(--text-3);margin-top:.5rem">${T[lang].searchNoResults}</p>`;
      return;
    }
    lastSearchResults=data;
    resultsEl.innerHTML=data.map((g,i)=>`<div class="guest-match" onclick="selectGuestMatch(${i})">${esc(g.guest_name)}</div>`).join('');
  },350);
}

function selectGuestMatch(i){
  selectedGuest=lastSearchResults[i];
  showSelectedGuest(selectedGuest);
}

function showSelectedGuest(g){
  const t=T[lang];
  document.getElementById('field-name-search').style.display='none';
  document.getElementById('field-name-selected').style.display='block';

  if(g.already_responded){
    document.getElementById('selected-guest-display').innerHTML=`${esc(g.guest_name)}<br><span style="font-weight:400;font-size:12px">${t.alreadyResponded}</span>`;
    document.getElementById('rsvp-rest').style.display='none';
    return;
  }

  document.getElementById('selected-guest-display').textContent=`${t.searchAreYouThisPerson} ${g.guest_name}`;
  document.getElementById('rsvp-rest').style.display='block';

  const guestsField=document.getElementById('r-guests');
  if(guestsField){
    guestsField.max=g.max_companions;
    const note=document.getElementById('max-companions-note');
    if(note) note.textContent=t.maxCompanionsNote.replace('{n}',g.max_companions);
  }
}

function resetGuestSearch(){
  selectedGuest=null;
  document.getElementById('field-name-search').style.display='block';
  document.getElementById('field-name-selected').style.display='none';
  document.getElementById('rsvp-rest').style.display='none';
  document.getElementById('r-name-search').value='';
  document.getElementById('guest-search-results').innerHTML='';
}

let attending=null;
let lodgingNeeded=null;
function setLodging(val){
  lodgingNeeded=val;
  document.getElementById('opt-lodging-yes').classList.toggle('sel-yes',val===true);
  document.getElementById('opt-lodging-no').classList.toggle('sel-no',val===false);
}
function setAttending(val){
  attending=val;
  document.getElementById('opt-yes').classList.toggle('sel-yes',val===true);
  document.getElementById('opt-no').classList.toggle('sel-no',val===false);
  ['field-guests','field-dietary','field-song','field-lodging','field-custom','field-message'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=(val===true)?'block':'none';
  });
  document.getElementById('btn-submit').disabled=false;
}

async function submitRSVP(e){
  e.preventDefault();
  const t=T[lang];
  const restricted=!!invitation.restrict_to_guest_list;
  const name=restricted?(selectedGuest?selectedGuest.guest_name:''):document.getElementById('r-name').value.trim();
  if(!name){ showToast(t.toastNoName); return; }
  if(attending===null){ showToast(t.toastNoAttend); return; }

  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent=t.sendingBtn;

  const payload={
    invitation_id: invitation.id,
    guest_list_id: restricted&&selectedGuest?selectedGuest.id:null,
    guest_name: name,
    guest_email: document.getElementById('r-email').value.trim()||null,
    attending,
    guest_count: document.getElementById('r-guests')?parseInt(document.getElementById('r-guests').value)||0:null,
    dietary: document.getElementById('r-dietary')?document.getElementById('r-dietary').value.trim():null,
    song_request: document.getElementById('r-song')?document.getElementById('r-song').value.trim():null,
    lodging_needed: document.getElementById('field-lodging')?lodgingNeeded:null,
    message: document.getElementById('r-message')?document.getElementById('r-message').value.trim():null,
    custom_answer: document.getElementById('r-custom')?document.getElementById('r-custom').value.trim():null
  };

  const {error}=await sb.from('rsvps').insert(payload);
  if(error){
    showToast(t.toastError);
    btn.disabled=false; btn.textContent=t.confirmBtn;
    return;
  }

  if(document.activeElement) document.activeElement.blur();

  document.getElementById('content').innerHTML=`
    <div class="thanks-card">
      <svg width="56" height="56" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:.75rem"><ellipse cx="18" cy="20" rx="2.2" ry="8" fill="#0D6E65"/><ellipse cx="18" cy="13" rx="2.8" ry="2.8" fill="#0D6E65"/><ellipse cx="10" cy="14" rx="8" ry="4" fill="#2EC4B6" opacity=".55" transform="rotate(-20 10 14)"/><ellipse cx="26" cy="14" rx="8" ry="4" fill="#7B2FBE" opacity=".55" transform="rotate(20 26 14)"/><ellipse cx="9" cy="18" rx="6.5" ry="3" fill="#2EC4B6" opacity=".35" transform="rotate(-10 9 18)"/><ellipse cx="27" cy="18" rx="6.5" ry="3" fill="#7B2FBE" opacity=".35" transform="rotate(10 27 18)"/></svg>
      <div class="thanks-emoji">${attending?'🎉':'💌'}</div>
      <h2>${attending?t.thanksYesTitle:t.thanksNoTitle}</h2>
      <p>${attending?t.thanksYesText:t.thanksNoText}</p>
      <div class="thanks-brand">DragonflAI Events</div>
    </div>`;
}

async function init(){
  if(!sb){ renderNotFound(); return; }
  const slug=getSlug();
  if(!slug){ renderNotFound(); return; }

  const {data,error}=await sb.from('invitations').select('*').eq('slug',slug).eq('is_published',true).single();
  if(error||!data){ renderNotFound(); return; }

  invitation=data;
  renderInvitation(data);
}

init();
</script>
</body>
</html>
